<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AdFrame — MN Fresh Start</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  header {
    background: #111;
    border-bottom: 3px solid #cc0000;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 { font-size: 22px; font-weight: 900; color: #fff; }
  header h1 span { color: #cc0000; }
  header p { color: #666; font-size: 13px; }

  main { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }

  .step { margin-bottom: 28px; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .step-num {
    background: #cc0000;
    color: #fff;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 12px;
    flex-shrink: 0;
  }

  .step-title { font-weight: 700; font-size: 15px; }

  .drop-zone {
    border: 2px dashed #444;
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    background: #222;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .drop-zone.active { border-color: #22c55e; background: #0d2b1a; }
  .drop-zone.drag { border-color: #cc0000; background: #2a1010; }
  .drop-zone:active { opacity: 0.8; }

  .drop-zone .icon { font-size: 34px; margin-bottom: 8px; }
  .drop-zone .label { font-weight: 600; font-size: 15px; }
  .drop-zone .sub { color: #666; font-size: 13px; margin-top: 4px; }
  .drop-zone .check { color: #22c55e; font-weight: 700; font-size: 15px; }

  .frame-preview {
    display: flex; align-items: center; gap: 14px; text-align: left;
  }
  .frame-preview img { height: 70px; border-radius: 6px; border: 1px solid #444; }

  .thumbs {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
  }
  .thumbs img {
    width: 68px; height: 51px; object-fit: cover;
    border-radius: 5px; border: 1px solid #333;
  }
  .thumbs .more {
    width: 68px; height: 51px; background: #2a2a2a;
    border-radius: 5px; border: 1px solid #333;
    display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 12px;
  }

  #processBtn {
    background: #555; color: #999;
    border: none; border-radius: 8px;
    padding: 14px 32px; font-size: 15px; font-weight: 700;
    cursor: not-allowed; width: 100%;
    transition: background 0.2s, color 0.2s;
  }
  #processBtn.ready { background: #cc0000; color: #fff; cursor: pointer; }
  #processBtn.ready:active { background: #aa0000; }

  .progress-wrap { margin-top: 16px; }
  .progress-bar-bg { background: #2a2a2a; border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-bar { background: #cc0000; height: 100%; width: 0%; transition: width 0.2s; border-radius: 99px; }
  .progress-label { color: #888; font-size: 12px; margin-top: 6px; }

  .error-box {
    background: #2a1010; color: #f87171;
    border-radius: 8px; padding: 12px 14px;
    font-size: 13px; margin-bottom: 14px;
  }

  .results-tip {
    background: #1c1f1c; border: 1px solid #2d4a2d;
    border-radius: 8px; padding: 14px 16px;
    font-size: 13px; color: #86efac;
    line-height: 1.7; margin-bottom: 18px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .result-card {
    background: #222; border-radius: 10px;
    overflow: hidden; border: 1px solid #333;
  }

  .result-card img { width: 100%; display: block; }

  .result-footer {
    padding: 8px 10px;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }

  .result-name {
    font-size: 11px; color: #666;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
  }

  .save-btn {
    background: #cc0000; color: #fff;
    border: none; border-radius: 6px;
    padding: 6px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .save-btn:active { background: #aa0000; }

  .download-all-btn {
    background: #22c55e; color: #000;
    border: none; border-radius: 8px;
    padding: 13px 28px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-bottom: 18px; width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .download-all-btn:active { background: #16a34a; }

  #progressSection, #resultsSection { display: none; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🚗 <span>Ad</span>Frame</h1>
    <p>Dealership photo compositor</p>
  </div>
</header>

<main>

  <!-- Step 1: Frame -->
  <div class="step">
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-title">Upload Your Frame (PNG)</div>
    </div>
    <div class="drop-zone" id="frameZone" onclick="document.getElementById('frameInput').click()">
      <div class="icon">🖼️</div>
      <div class="label">Tap to upload frame</div>
      <div class="sub">Your branded PNG with transparent car area</div>
    </div>
    <input type="file" id="frameInput" accept="image/*" style="display:none">
  </div>

  <!-- Step 2: Car photos -->
  <div class="step">
    <div class="step-header">
      <div class="step-num">2</div>
      <div class="step-title">Upload Car Photos</div>
    </div>
    <div class="drop-zone" id="carZone" onclick="document.getElementById('carInput').click()">
      <div class="icon">📷</div>
      <div class="label">Tap to select car photos</div>
      <div class="sub">Pick all at once — 10, 20, 30+ supported</div>
    </div>
    <input type="file" id="carInput" accept="image/*" multiple style="display:none">
    <div class="thumbs" id="thumbs"></div>
  </div>

  <!-- Step 3: Process -->
  <div class="step">
    <div class="step-header">
      <div class="step-num">3</div>
      <div class="step-title">Process</div>
    </div>
    <div class="error-box" id="errorBox" style="display:none"></div>
    <button id="processBtn" onclick="processAll()">Select frame &amp; photos first</button>
    <div class="progress-wrap" id="progressSection">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-label" id="progressLabel">0%</div>
    </div>
  </div>

  <!-- Step 4: Results -->
  <div class="step" id="resultsSection">
    <div class="step-header">
      <div class="step-num">4</div>
      <div class="step-title" id="resultsTitle">Images ready</div>
    </div>
    <div class="results-tip" id="resultsTip"></div>
    <button class="download-all-btn" id="downloadAllBtn" onclick="downloadAll()">⬇ Download All</button>
    <div class="results-grid" id="resultsGrid"></div>
  </div>

</main>

<script>
  const FRAME_W = 600, FRAME_H = 450;
  const SLOT = { x: 5, y: 81, w: 588, h: 287 };

  let frameFile = null;
  let carFiles = [];
  let processed = [];

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isMobile = /Mobi|Android/i.test(navigator.userAgent) || isIOS;

  function loadImage(src) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = rej;
      img.src = src;
    });
  }

  function fileToDataURL(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  async function compositeOne(frameImg, carFile) {
    const carDataURL = await fileToDataURL(carFile);
    const carImg = await loadImage(carDataURL);

    const scale = Math.min(4, Math.max(1, carImg.width / FRAME_W));
    const canvasW = Math.round(FRAME_W * scale);
    const canvasH = Math.round(FRAME_H * scale);
    const slot = {
      x: Math.round(SLOT.x * scale), y: Math.round(SLOT.y * scale),
      w: Math.round(SLOT.w * scale), h: Math.round(SLOT.h * scale),
    };

    const canvas = document.createElement('canvas');
    canvas.width = canvasW;
    canvas.height = canvasH;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    const scaleX = slot.w / carImg.width;
    const scaleY = slot.h / carImg.height;
    const carScale = Math.max(scaleX, scaleY);
    const drawW = carImg.width * carScale;
    const drawH = carImg.height * carScale;
    const drawX = slot.x + (slot.w - drawW) / 2;
    const drawY = slot.y + (slot.h - drawH) / 2;

    ctx.drawImage(carImg, drawX, drawY, drawW, drawH);
    ctx.drawImage(frameImg, 0, 0, canvasW, canvasH);

    return canvas.toDataURL('image/jpeg', 0.95);
  }

  // Frame upload
  document.getElementById('frameInput').addEventListener('change', async function() {
    const file = this.files[0];
    if (!file) return;
    frameFile = file;
    const dataURL = await fileToDataURL(file);
    const zone = document.getElementById('frameZone');
    zone.classList.add('active');
    zone.innerHTML = `
      <div class="frame-preview">
        <img src="${dataURL}" alt="frame">
        <div>
          <div class="check">✓ Frame loaded</div>
          <div style="color:#777;font-size:13px;margin-top:3px">${file.name}</div>
          <div style="color:#555;font-size:12px;margin-top:3px">Tap to replace</div>
        </div>
      </div>`;
    updateBtn();
  });

  // Car upload
  document.getElementById('carInput').addEventListener('change', async function() {
    carFiles = Array.from(this.files);
    if (!carFiles.length) return;
    processed = [];
    document.getElementById('resultsSection').style.display = 'none';

    const zone = document.getElementById('carZone');
    zone.classList.add('active');
    zone.innerHTML = `
      <div class="icon">✅</div>
      <div class="check">${carFiles.length} photo${carFiles.length !== 1 ? 's' : ''} ready</div>
      <div class="sub">Tap to replace</div>`;

    // Thumbnails
    const thumbsEl = document.getElementById('thumbs');
    thumbsEl.innerHTML = '';
    const max = Math.min(carFiles.length, 20);
    for (let i = 0; i < max; i++) {
      const url = await fileToDataURL(carFiles[i]);
      const img = document.createElement('img');
      img.src = url;
      thumbsEl.appendChild(img);
    }
    if (carFiles.length > 20) {
      const more = document.createElement('div');
      more.className = 'more';
      more.textContent = `+${carFiles.length - 20}`;
      thumbsEl.appendChild(more);
    }
    updateBtn();
  });

  function updateBtn() {
    const btn = document.getElementById('processBtn');
    if (frameFile && carFiles.length > 0) {
      btn.classList.add('ready');
      btn.textContent = `▶ Process ${carFiles.length} Photo${carFiles.length !== 1 ? 's' : ''}`;
    } else {
      btn.classList.remove('ready');
      btn.textContent = 'Select frame & photos first';
    }
  }

  async function processAll() {
    if (!frameFile || carFiles.length === 0) return;

    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('processBtn').textContent = 'Processing…';
    document.getElementById('processBtn').classList.remove('ready');
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('resultsSection').style.display = 'none';
    processed = [];

    try {
      const frameDataURL = await fileToDataURL(frameFile);
      const frameImg = await loadImage(frameDataURL);

      for (let i = 0; i < carFiles.length; i++) {
        const dataURL = await compositeOne(frameImg, carFiles[i]);
        const name = carFiles[i].name.replace(/\.[^.]+$/, '') + '_framed.jpg';
        processed.push({ dataURL, name });

        const pct = Math.round(((i + 1) / carFiles.length) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressLabel').textContent = `${i + 1} of ${carFiles.length} done (${pct}%)`;
        await new Promise(r => setTimeout(r, 10));
      }

      showResults();
    } catch (err) {
      const eb = document.getElementById('errorBox');
      eb.style.display = 'block';
      eb.textContent = 'Error: ' + err.message;
    }

    document.getElementById('processBtn').classList.add('ready');
    document.getElementById('processBtn').textContent = `▶ Process ${carFiles.length} Photo${carFiles.length !== 1 ? 's' : ''} Again`;
  }

  function showResults() {
    const section = document.getElementById('resultsSection');
    section.style.display = 'block';
    document.getElementById('resultsTitle').textContent = `${processed.length} image${processed.length !== 1 ? 's' : ''} ready`;

    const tip = document.getElementById('resultsTip');
    if (isIOS) {
      tip.innerHTML = '📱 <strong>iPhone/iPad:</strong> Tap <strong>Save</strong> on each image, then tap & hold the preview → "Save to Photos"';
    } else if (isMobile) {
      tip.innerHTML = '📱 <strong>Android:</strong> Tap <strong>Save</strong> — the image will download to your Downloads folder';
    } else {
      tip.innerHTML = '💻 <strong>Desktop:</strong> Click <strong>Save</strong> to download each image, or use <strong>Download All</strong>';
    }

    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = '';
    processed.forEach(({ dataURL, name }) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      const img = document.createElement('img');
      img.src = dataURL;
      const footer = document.createElement('div');
      footer.className = 'result-footer';
      const nameEl = document.createElement('div');
      nameEl.className = 'result-name';
      nameEl.textContent = name;
      const btn = document.createElement('button');
      btn.className = 'save-btn';
      btn.textContent = '⬇ Save';
      btn.onclick = () => downloadOne(dataURL, name);
      footer.appendChild(nameEl);
      footer.appendChild(btn);
      card.appendChild(img);
      card.appendChild(footer);
      grid.appendChild(card);
    });

    section.scrollIntoView({ behavior: 'smooth' });
  }

  function downloadOne(dataURL, name) {
    const a = document.createElement('a');
    a.href = dataURL;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  async function downloadAll() {
    for (let i = 0; i < processed.length; i++) {
      downloadOne(processed[i].dataURL, processed[i].name);
      await new Promise(r => setTimeout(r, 300));
    }
  }

  // Drag and drop for desktop
  const carZone = document.getElementById('carZone');
  carZone.addEventListener('dragover', e => { e.preventDefault(); carZone.classList.add('drag'); });
  carZone.addEventListener('dragleave', () => carZone.classList.remove('drag'));
  carZone.addEventListener('drop', e => {
    e.preventDefault();
    carZone.classList.remove('drag');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (files.length) {
      const dt = new DataTransfer();
      files.forEach(f => dt.items.add(f));
      document.getElementById('carInput').files = dt.files;
      document.getElementById('carInput').dispatchEvent(new Event('change'));
    }
  });
</script>
</body>
</html>
